name: Submit URL to IndexNow
on:
  workflow_run:
    workflows: ["Build and Deploy"]  # GitHub Pages 배포를 담당하는 워크플로우 이름을 지정
    types:
      - completed  # 배포가 완료되면 실행

jobs:
  notify:
    runs-on: ubuntu-latest  # 이 작업은 최신 Ubuntu 환경에서 실행됨

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 커밋 히스토리를 가져옵니다.

      - name: Ensure _posts folder exists  # _posts 폴더가 존재하는지 확인하고 없으면 생성
        run: |
          mkdir -p _posts

      - name: Get changed files  # 변경된 파일 목록을 가져오는 단계
        id: changed_files  # 이 단계의 결과를 다른 곳에서 참조할 때 사용할 ID
        run: |
          # 이전 커밋이 있는지 확인 후 git diff 실행
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --name-only HEAD^ HEAD | grep '^_posts/' > changed_files.txt
          else
            touch changed_files.txt
          fi
          # 변경된 파일 중 .md 파일만 필터링하여 post_files.txt에 저장
          grep -E '\.md$' changed_files.txt > post_files.txt

      - name: Prepare IndexNow Status File  # IndexNow 상태 파일을 초기화
        run: |
          # indexnow-status.md 파일에 기본 헤더 정보 작성 (기존 파일 덮어쓰기)
          echo "---" > indexnow-status.md
          echo "layout: page" >> indexnow-status.md
          echo "title: IndexNow 처리 상태" >> indexnow-status.md
          echo "permalink: /indexnow-status/" >> indexnow-status.md
          echo "---" >> indexnow-status.md
          echo "" >> indexnow-status.md
          echo "# IndexNow 처리 결과" >> indexnow-status.md
          echo "" >> indexnow-status.md
          # 표의 헤더 작성
          echo "| 요청 날짜 | 응답 결과 | URL |" >> indexnow-status.md
          echo "| --- | --- | --- |" >> indexnow-status.md

      - name: Curl Request to IndexNow for each post  # IndexNow에 URL을 제출하는 단계
        run: |
          # 현재 날짜를 YYYY-MM-DD 형식으로 가져옴
          current_date=$(date +'%Y-%m-%d')
          temp_file="temp_results.md"
          touch $temp_file

          # post_files.txt 파일에 있는 각 파일명을 읽어서 반복 처리
          while IFS= read -r file; do
            # _posts/ 디렉토리 경로를 제거하여 파일명만 가져옴
            base_name="${file#_posts/}"
            # 파일명에서 앞부분의 'YYYY-MM-DD-' 날짜 부분을 제거
            title="${base_name:11}"
            # 파일명에서 확장자 .md를 제거
            title="${title%.md}"
            # 최종적으로 IndexNow에 제출할 URL 생성
            url="https://leejuhyeong424.github.io/posts/${title}/"

            # curl 명령어를 사용하여 IndexNow API에 URL을 제출하고 결과 기록
            response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow?url=${url}&key=${{ secrets.INDEXNOW_API_KEY }}")

            # 응답 코드를 한글로 변환
            case $response in
              "200")
                result_text="성공"
                tooltip="요청이 성공적으로 처리되었습니다. 반환 코드: $response"
                ;;
              "400")
                result_text="잘못된 요청"
                tooltip="요청에 잘못된 형식이 포함되어 있습니다. 반환 코드: $response"
                ;;
              "401")
                result_text="인증 실패"
                tooltip="올바르지 않은 인증 키가 사용되었습니다. 반환 코드: $response"
                ;;
              "404")
                result_text="찾을 수 없음"
                tooltip="요청한 URL을 찾을 수 없습니다. 반환 코드: $response"
                ;;
              "500")
                result_text="서버 오류"
                tooltip="서버에서 오류가 발생했습니다. 반환 코드: $response"
                ;;
              *)
                result_text="알 수 없음"
                tooltip="예상치 못한 응답 코드: $response 반환 코드: $response"
                ;;
            esac

            # IndexNow 요청 결과를 임시 파일에 표 형식으로 추가 기록 (툴팁 포함)
            echo "| ${current_date} | <span title='${tooltip}'>${result_text}</span> | [${url}](${url}) |" >> $temp_file
          done < post_files.txt  # post_files.txt 파일의 모든 라인을 처리

          # 기존 indexnow-status.md 파일의 내용을 읽어오고 새로운 내용을 위에 추가하여 덮어쓰기
          if [ -f indexnow-status.md ]; then
            awk '/# IndexNow 처리 결과/{print; print ""; system("cat " temp_file); next}1' indexnow-status.md > new_indexnow_status.md
            mv new_indexnow_status.md indexnow-status.md
          else
            cat $temp_file >> indexnow-status.md
          fi

          rm $temp_file

      - name: Commit IndexNow Results
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add indexnow-status.md
          git commit -m "Update IndexNow 처리 상태"
          git push
