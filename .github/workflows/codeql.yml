# 대부분의 프로젝트에서는 이 워크플로우 파일을 수정할 필요가 없습니다.
# 단순히 이 파일을 리포지토리에 커밋하기만 하면 됩니다.
#
# 분석할 언어 집합을 재정의하거나, 맞춤형 쿼리 또는 빌드 로직을 제공하고자 할 경우
# 이 파일을 수정할 수 있습니다.
#
# ******** 참고 ********
# 리포지토리에서 사용된 언어를 자동으로 감지하려고 했습니다. 아래 정의된
# `language` 매트릭스를 확인하여 지원되는 CodeQL 언어 집합이 맞는지 확인해 주세요.
#
name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]  # "main" 브랜치에 푸시될 때 워크플로우 실행
  pull_request:
    branches: [ "main" ]  # "main" 브랜치로 PR 생성 시 워크플로우 실행
  schedule:
    - cron: '43 21 * * 6'  # 매주 토요일 오후 9시 43분(UTC)에 자동 실행

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})  # 선택된 언어 분석
    # 러너 크기는 CodeQL 분석 시간에 영향을 줍니다. 자세한 내용은 다음을 참고하세요:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners (GitHub.com 전용)
    # 더 큰 러너를 사용하거나 더 많은 리소스를 가진 머신을 사용하여 분석 시간을 줄일 수 있습니다.
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      # 모든 워크플로우에 필요한 권한
      security-events: write

      # 내부 또는 비공개 CodeQL 패키지를 가져오기 위한 권한
      packages: read

      # 비공개 리포지토리에서만 필요한 권한
      actions: read
      contents: read

    strategy:
      fail-fast: false  # 한 언어에서 실패하더라도 나머지 언어는 계속 분석
      matrix:
        include:
        - language: javascript-typescript  # JavaScript 및 TypeScript 언어 분석
          build-mode: none  # 빌드 모드 설정 없음
        - language: ruby  # Ruby 언어 분석
          build-mode: none  # 빌드 모드 설정 없음
        # CodeQL에서 지원하는 언어: 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift'
        # 'c-cpp'는 C, C++ 또는 두 언어 모두를 분석
        # 'java-kotlin'은 Java, Kotlin 또는 두 언어 모두를 분석
        # 분석할 언어를 변경하거나 빌드 모드를 맞춤 설정하려면
        # https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning 문서를 참조하세요.
        # 컴파일 언어를 분석할 경우, 빌드 모드를 "manual"로 설정하고 빌드 방법을 정의할 수 있습니다.
    steps:
    - name: 리포지토리 체크아웃
      uses: actions/checkout@v4  # 리포지토리의 코드를 가져옵니다.

    # CodeQL 도구를 초기화합니다.
    - name: CodeQL 초기화
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}  # 분석할 언어 설정
        build-mode: ${{ matrix.build-mode }}  # 빌드 모드 설정
        # 맞춤형 쿼리를 사용하려면 이곳 또는 설정 파일에 추가할 수 있습니다.
        # 기본적으로 여기에 나열된 쿼리는 설정 파일에 명시된 쿼리를 덮어씁니다.
        # 쿼리 리스트 앞에 "+"를 추가하여 설정 파일의 쿼리와 함께 사용할 수 있습니다.

        # CodeQL의 쿼리 패키지에 대한 자세한 내용은: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs 를 참고하세요.
        # queries: security-extended,security-and-quality

    # 분석 중 언어에 대해 "코드를 자동으로 빌드할 수 없습니다" 오류가 발생할 경우,
    # 위 매트릭스에서 빌드 모드를 "manual"로 설정하고 이 단계를 수정하여 코드를 빌드합니다.
    # ℹ️ OS 쉘을 사용해 실행할 명령줄 프로그램.
    # 📚 https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun 를 참조하세요.
    - if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo '하나 이상의 언어에 대해 "manual" 빌드 모드를 사용하고 있는 경우,'
        echo '이 명령을 코드를 빌드하는 명령으로 대체하십시오, 예를 들어:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1  # 오류 발생 시 빌드 실패

    - name: CodeQL 분석 수행
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"  # 각 언어별로 카테고리 설정
